<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musikkhistorie — Interaktiv tidslinje</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0c0a; --surface: #181612; --card: #1f1c18;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
    --text: #e8e3d8; --muted: #8a8578; --faint: #4a4640;
    --hover-bg: #252118;
  }
  html.light {
    --bg: #f7f5f2; --surface: #ffffff; --card: #ffffff;
    --border: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.16);
    --text: #1a1814; --muted: #6b6760; --faint: #b0ada8;
    --hover-bg: #f0ede8;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }

  header { padding: 3rem 2rem 2rem; max-width: 900px; margin: 0 auto; border-bottom: 0.5px solid var(--border); }
  header .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; line-height: 1.15; color: var(--text); margin-bottom: 0.5rem; }
  header h1 em { font-style: italic; color: #c8a96a; }
  header p { color: var(--muted); font-size: 14px; max-width: 520px; font-weight: 300; }

  .era-nav { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 0; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .era-nav::-webkit-scrollbar { display: none; }
  .era-tab { flex-shrink: 0; padding: 10px 18px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 400; color: var(--muted); background: none; border: none; border-bottom: 1.5px solid var(--faint); cursor: pointer; transition: all .2s; white-space: nowrap; letter-spacing: 0.02em; }
  .era-tab:hover { color: var(--text); border-bottom-color: var(--border-hover); }
  .era-tab.active { color: var(--text); font-weight: 500; border-bottom-width: 2px; }

  main { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  .era-header { margin-bottom: 2rem; animation: fadeUp .25s ease both; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  .years-badge { display: inline-block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; font-weight: 500; }
  .era-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; line-height: 1.2; margin-bottom: 10px; }
  .era-header .summary { font-size: 15px; color: var(--muted); max-width: 700px; line-height: 1.75; font-weight: 300; margin-bottom: 1.2rem; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.5rem; }
  @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
  .info-block { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 1.1rem 1.2rem; }
  .info-block h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.13em; color: var(--faint); margin-bottom: 10px; }
  .info-block ul { list-style: none; }
  .info-block ul li { font-size: 13px; color: var(--muted); padding: 5px 0; border-bottom: 0.5px solid var(--border); line-height: 1.5; display: flex; gap: 8px; }
  .info-block ul li:last-child { border-bottom: none; }
  .info-block ul li::before { content: "–"; color: var(--faint); flex-shrink: 0; }

  .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 1.8rem 0 1.4rem; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--faint); margin-bottom: 1rem; }

  .composer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 1.2rem; }
  .composer-btn { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: left; cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif; }
  .composer-btn:hover { border-color: var(--border-hover); background: var(--hover-bg); transform: translateY(-1px); }
  .composer-btn.active { border-width: 1.5px; }
  .composer-btn .c-name { font-size: 14px; font-weight: 500; color: var(--text); display: block; margin-bottom: 2px; }
  .composer-btn .c-years { font-size: 11px; color: var(--muted); }

  .detail-panel { background: var(--surface); border: 0.5px solid var(--border-hover); border-radius: 12px; padding: 1.4rem 1.6rem; animation: fadeUp .2s ease both; margin-top: 1rem; }
  .detail-panel .d-name { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .detail-panel .d-years { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .d-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--faint); margin-bottom: 6px; margin-top: 14px; }
  .detail-panel .d-work { font-size: 14px; color: #c8a96a; font-style: italic; font-family: 'Playfair Display', serif; margin-bottom: 4px; }
  .detail-panel .d-note { font-size: 14px; color: var(--muted); line-height: 1.75; font-weight: 300; }
  .style-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .style-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--border-hover); color: var(--muted); }
  .char-list { list-style: none; margin: 0; }
  .char-list li { font-size: 13px; color: var(--muted); padding: 4px 0; border-bottom: 0.5px solid var(--border); display: flex; gap: 8px; line-height: 1.5; }
  .char-list li:last-child { border-bottom: none; }
  .char-list li::before { content: "–"; color: var(--faint); flex-shrink: 0; }
  .yt-links { display: flex; flex-direction: column; gap: 6px; }
  .yt-link { display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 13px; color: var(--muted); padding: 7px 10px; border-radius: 8px; border: 0.5px solid var(--border); transition: all .15s; background: var(--card); cursor: pointer; font-family: 'DM Sans', sans-serif; width: 100%; text-align: left; }
  .yt-link:hover { border-color: var(--border-hover); color: var(--text); background: var(--hover-bg); }
  .yt-icon { width: 18px; height: 18px; flex-shrink: 0; }

  #view-bg { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 4rem; }
  .bg-cats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2rem; }
  .bg-cat-btn { padding: 8px 16px; font-size: 12px; font-family: 'DM Sans', sans-serif; border: 0.5px solid var(--border); border-radius: 20px; background: var(--card); color: var(--muted); cursor: pointer; transition: all .2s; }
  .bg-cat-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .bg-cat-btn.active { font-weight: 500; border-width: 1.5px; color: var(--text); }
  .bg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .bg-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.2rem 1.4rem; cursor: pointer; transition: all .2s; }
  .bg-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
  .bg-card.open { border-width: 1.5px; }
  .bg-card .bg-term { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .bg-card .bg-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin-bottom: 8px; }
  .bg-card .bg-short { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .bg-card .bg-long { font-size: 13px; color: var(--muted); line-height: 1.65; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); display: none; }
  .bg-card.open .bg-long { display: block; }
  .bg-card .bg-ex { margin-top: 8px; font-size: 12px; color: var(--faint); font-style: italic; }
  footer { text-align: center; padding: 2rem; font-size: 12px; color: var(--faint); border-top: 0.5px solid var(--border); letter-spacing: 0.04em; }
  @media (max-width: 600px) { header, main, .era-nav { padding-left: 1rem; padding-right: 1rem; } .composer-grid { grid-template-columns: 1fr 1fr; } }

  .view-tabs { max-width: 900px; margin: 0 auto; padding: 0 2rem; display: flex; border-bottom: 0.5px solid var(--border); }
  .view-tab { padding: 12px 24px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 400; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; letter-spacing: 0.02em; }
  .view-tab:hover { color: var(--text); }
  .view-tab.active { color: var(--text); font-weight: 500; border-bottom-color: var(--text); }

  #view-qz { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 4rem; display: grid; grid-template-columns: 180px 1fr; gap: 2rem; align-items: start; }
  @media (max-width: 700px) { #view-qz { grid-template-columns: 1fr; } }
  .qz-era-row { display: flex; flex-direction: column; gap: 6px; position: sticky; top: 120px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem; }
  @media (max-width: 700px) { .qz-era-row { flex-direction: row; flex-wrap: wrap; position: static; } }
  .qz-era-btn { padding: 8px 16px; font-size: 12px; font-family: 'DM Sans', sans-serif; border: 0.5px solid var(--border); border-radius: 20px; background: var(--card); color: var(--muted); cursor: pointer; transition: all .2s; letter-spacing: 0.02em; }
  .qz-era-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .qz-era-btn.active { font-weight: 500; border-width: 1.5px; }
  .qz-header { margin-bottom: 1.5rem; animation: fadeUp .2s ease both; }
  .qz-header h2 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
  .qz-header p { font-size: 14px; color: var(--muted); font-weight: 300; }
  .qz-progress { font-size: 11px; text-transform: uppercase; letter-spacing: 0.13em; color: var(--faint); margin-bottom: 1.2rem; }
  .qz-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.4rem 1.6rem; animation: fadeUp .2s ease both; }
  .qz-q { font-size: 16px; color: var(--text); line-height: 1.65; margin-bottom: 1.2rem; font-weight: 400; }
  .qz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 600px) { .qz-opts { grid-template-columns: 1fr; } }
  .qz-opt { text-align: left; padding: 12px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; border: 0.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; line-height: 1.4; }
  .qz-opt:hover:not(.disabled) { border-color: var(--border-hover); color: var(--text); background: var(--hover-bg); }
  .qz-opt.correct { background: rgba(62,207,142,0.12); border-color: #3ecf8e; color: #5de0a0; font-weight: 500; }
  .qz-opt.wrong { background: rgba(232,83,74,0.12); border-color: #e8534a; color: #ee7870; }
  .qz-opt.reveal { background: rgba(62,207,142,0.08); border-color: rgba(62,207,142,0.3); color: #5de0a0; }
  .qz-opt.disabled { pointer-events: none; }
  .qz-explain { margin-top: 1rem; font-size: 13px; line-height: 1.7; padding: 12px 14px; border-radius: 8px; font-weight: 300; }
  .qz-explain.correct { background: rgba(62,207,142,0.08); color: #5de0a0; }
  .qz-explain.wrong { background: rgba(232,83,74,0.08); color: #ee7870; }
  .qz-next { margin-top: 10px; padding: 10px 22px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; border: 0.5px solid var(--border-hover); border-radius: 8px; background: var(--surface); color: var(--text); cursor: pointer; transition: all .15s; }
  .qz-next:hover { background: var(--hover-bg); }
  .qz-result { text-align: center; padding: 3rem 1rem; }
  .qz-result .score { font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 700; margin-bottom: 8px; }
  .qz-result p { font-size: 15px; color: var(--muted); margin-bottom: 2rem; font-weight: 300; }
  .qz-restart { padding: 11px 24px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; border: 0.5px solid var(--border-hover); border-radius: 8px; background: var(--surface); color: var(--text); cursor: pointer; }
  .qz-restart:hover { background: var(--hover-bg); }
</style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div>
      <div class="eyebrow">Musikkhistorie · Fra middelalder til i dag</div>
      <h1>Vestlig<br><em>musikk­historie</em></h1>
      <p>Utforsk epokene i <strong>Tidslinje</strong>-fanen, eller test deg selv i <strong>Quiz</strong>-fanen.</p>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()" title="Bytt mellom lys og mørk modus" style="margin-top:0.5rem;padding:8px 14px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--card);border:0.5px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;">☀ Lys modus</button>
  </div>
</header>
<div class="view-tabs">
  <button class="view-tab active" id="tab-tl" onclick="switchView('tl')">Tidslinje</button>
  <button class="view-tab" id="tab-qz" onclick="switchView('qz')">Quiz</button>
  <button class="view-tab" id="tab-bg" onclick="switchView('bg')">Begreper</button>
</div>
<div id="view-tl">
  <nav class="era-nav" id="era-nav" aria-label="Velg epoke"></nav>
  <main id="main-content" aria-live="polite"></main>
</div>
<div id="view-qz" style="display:none">
  <div id="qz-era-row" class="qz-era-row"></div>
  <div id="qz-body"></div>
</div>
<div id="view-bg" style="display:none">
  <div id="bg-content"></div>
</div>
<footer>Musikkhistorie · Undervisningsressurs</footer>

<script>
const YT_ICON = `<svg class="yt-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="5" fill="#FF0000"/><path d="M19.6 7.8s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C14.4 4.8 12 4.8 12 4.8s-2.4 0-4.8.1c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S4.2 9.4 4.2 11v1.5c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.3.8C8.9 18.7 12 18.7 12 18.7s2.4 0 4.8-.2c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2V11c0-1.6-.2-3.2-.2-3.2zm-11.3 6.5V9.7l5.4 2.3-5.4 2.3z" fill="white"/></svg>`;

const eras = [
  {
    id: "medieval", label: "Middelalder", years: "500–1400",
    accent: "#9d7aff", badgeBg: "rgba(157,122,255,0.12)", badgeText: "#b99aff",
    summary: "Musikken i middelalderen var i all hovedsak kirkens musikk. Gregoriansk sang — enstemmig, latinsk og uten instrumenter — var standarden. Fra ca. 900 vokste flerstemmig sang (organum) frem. Mot 1300-tallet ble musikken mer bevegelig og rytmisk nyansert i det som kalles Ars Nova.",
    styleTracks: [
      { label: "Gregoriansk sang — stiltrekk", items: [
        "Enstemmig (monofon), mannlig sang uten instrumenter",
        "Latinsk, kirkelig tekst — liturgisk funksjon",
        "Rytmen følger språkrytmen — fri rytmikk uten fast puls",
        "Melodikken er mest trinnvis med lite omfang (litt over en oktav)",
        "Kirketoneartene: dorisk, frygisk, lydisk, mixolydisk",
        "Upersonlig og objektivt uttrykk — gudstjenestelig funksjon"
      ]},
      { label: "Historisk utvikling", items: [
        "Ca. 600: Gregor den store standardiserer gregoriansk sang",
        "Ca. 900: Organum — ny stemme i parallelle kvarter til gregorianikken",
        "1100-t: Notre Dame-skolen i Paris (Ars Antiqua) — Pérotin",
        "1300-t: Ars Nova — mer framdrift, todelt takt, nyansert rytmikk",
        "Trubadurer (Sør-Frankrike), trouvères (Nord-Frankrike), minnesang (Tyskland)",
        "Verdslig, dikterisk sangform — kjærlighetssanger dominerer"
      ]}
    ],
    composers: [
      {
        name: "Hildegard von Bingen", years: "1098–1179",
        work: "O Euchari · Ordo Virtutum",
        note: "Den tidligste komponisten vi kjenner navnet på. Tok utgangspunkt i gregoriansk sang, men med noe større melodisk omfang, oftere og større sprang, og et mer uttrykksfull tonespråk. Abbedisse fra Rhinen — bemerkelsesverdig at en kvinne fikk kunstnerisk uttrykk i middelalderen.",
        characteristics: [
          "Fri, svevende melodikk med store sprang — mer uttrykksfullt enn vanlig gregoriansk sang",
          "Teksten styrer melodiens form og rytme",
          "Mystisk og andektig stemning — henvendt til det guddommelige",
          "Monofon stil, men med større melodisk spenn enn standardgregorianikken"
        ],
        youtube: [
          { title: "Hildegard von Bingen O Euchari in leta via" },
          { title: "Hildegard von Bingen O Virtus Sapientiae" }
        ]
      },
      {
        name: "Pérotin", years: "ca. 1160–1220",
        work: "Viderunt omnes · Alleluia nativitas",
        note: "Fransk komponist og organist ved Notre-Dame-katedralen i Paris. Tilhørte Ars Antiqua-perioden. Verkene er i organumstil — det ble komponert over- og understemmer til en gregoriansk melodi. Den gregorianske melodien (tenor) har ekstremt lange noteverdier i bunnen.",
        characteristics: [
          "Opptil fire stemmer over en langstrakt gregoriansk melodi (tenor)",
          "Øverste stemmer beveger seg raskere og mer ornamentert",
          "Rytmiske mønstre (modalrytmikk) styrer de øvre stemmene",
          "Kraftig, katedralaktig klang — komponert for Notre-Dame i Paris"
        ],
        youtube: [
          { title: "Perotin Viderunt omnes Notre Dame organum" },
          { title: "Perotin Alleluia nativitas organum" }
        ]
      },
      {
        name: "Guillaume de Machaut", years: "1300–1377",
        work: "Messe de Nostre Dame · Ballader og virelais",
        note: "Fransk komponist tilhørende Ars Nova-perioden ('Den nye kunsten'). Mer framdrift og bevegelse i musikken, mer nyansert rytmikk og todelt takt. Skrev antagelig den første gjennomkomponerte messen over alle ordinarieleddene — en cantus firmus-messe bygget på en gregoriansk melodi.",
        characteristics: [
          "Ars Nova: rytmisk frihet og framdrift — todelt takt innføres",
          "Cantus firmus-teknikk: gregoriansk melodi i bunnen, frie stemmer over",
          "Tre til fire stemmer i gjennomarbeidet polyfoni",
          "Kombinerer sakral kirkemusikk med verdslige sanger og ballader"
        ],
        youtube: [
          { title: "Machaut Messe de Nostre Dame Kyrie medieval polyphony" },
          { title: "Machaut Douce dame jolie ballade medieval" }
        ]
      },
      {
        name: "Trubadurer og minnesangere", years: "ca. 1100–1350",
        work: "Verdslig sangkunst — kjærlighetssanger",
        note: "Verdslig, dikterisk sangform i middelalderen. Solosang med improvisert akkompagnement. Kjærlighetssanger dominerer — det dreier seg om såkalt høvisk kjærlighet. Sør-Frankrike: troubadour. Nord-Frankrike: trouvère (ofte fromme tekster). Tyskland: minnesang.",
        characteristics: [
          "Solosang med lett improvisert akkompagnement (lut, fele)",
          "Verdslig tekst — kjærlighet, natur og ridderliv",
          "Enstemmige melodier med tydelig tekstmelodi",
          "Improvisatorisk og personlig uttrykk — kontrast til kirkens upersonlige stil"
        ],
        youtube: [
          { title: "troubadour medieval music songs 12th century" },
          { title: "Walther von der Vogelweide Palästinalied minnesang" }
        ]
      }
    ]
  },
  {
    id: "renaissance", label: "Renessanse", years: "1400–1600",
    accent: "#3ecf8e", badgeBg: "rgba(62,207,142,0.10)", badgeText: "#5de0a0",
    summary: "Renessansen ('gjenfødelsen') hentet inspirasjon fra antikkens idealer og humanismen. Enkeltmenneskets verdi sto i sentrum. Vokalpolyfonien nådde sitt høydepunkt. Boktrykkerkunsten spredte musikk til et bredere publikum, og sekulær musikk vokste frem ved siden av kirkemusikken.",
    styleTracks: [
      { label: "Musikalske stiltrekk", items: [
        "Vokalpolyfoni — det sentrale stilidealet",
        "Fortsatt modal tonalitet, men med tonale innslag (eolisk og jonisk — forløpere for moll og dur)",
        "Selvstendiggjøring av stemmene — imitasjonsteknikk",
        "Treklangharmonikk — akkorder begynner å prege musikken",
        "Dissonans og konsonans som spenningsskapende formelement",
        "Klangfylde og velklang — dypere basstemme, kor i stedet for bare solister",
        "Klarhet i uttrykket — balanse mellom form og fantasi"
      ]},
      { label: "Historisk kontekst", items: [
        "Flandern: 'Den flamske skolen' — europeisk musikksenter",

let activeIdx = 0;
let activeComposer = null;

function renderNav() {
  const nav = document.getElementById('era-nav');
  nav.innerHTML = '';
  eras.forEach((era, i) => {
    const btn = document.createElement('button');
    btn.className = 'era-tab' + (i === activeIdx ? ' active' : '');
    btn.textContent = era.label;
    if (i === activeIdx) { btn.style.borderBottomColor = era.accent; btn.style.color = era.accent; }
    btn.onclick = () => { activeIdx = i; activeComposer = null; renderNav(); renderMain(); };
    nav.appendChild(btn);
  });
}

function renderMain() {
  const era = eras[activeIdx];
  const content = document.getElementById('main-content');

  const infoCols = era.styleTracks.map(track => `
    <div class="info-block">
      <h3>${track.label}</h3>
      <ul>${track.items.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`).join('');

  const composerBtns = era.composers.map((comp, ci) => `
    <button class="composer-btn${activeComposer === comp.name ? ' active' : ''}"
      style="${activeComposer === comp.name ? 'border-color:' + era.accent : ''}"
      data-idx="${ci}"
      onclick="selectComposer(this)">
      <span class="c-name">${comp.name}</span>
      <span class="c-years">${comp.years}</span>
    </button>`).join('');

  let detailHTML = '';
  if (activeComposer) {
    const comp = era.composers.find(c => c.name === activeComposer);
    if (comp) {
      const charItems = comp.characteristics.map(c => `<li>${c}</li>`).join('');
      const ytLinks = comp.youtube.map(yt => {
        const searchUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(yt.title);
        return `<button class="yt-link" onclick="window.open('${searchUrl}','_blank')">${YT_ICON}<span>${yt.title}</span></button>`;
      }).join('');
      detailHTML = `
        <div class="detail-panel" style="border-color:${era.accent}33">
          <div class="d-name">${comp.name}</div>
          <div class="d-years">${comp.years}</div>
          <div class="d-label">Kjente verk</div>
          <div class="d-work">${comp.work}</div>
          <div class="d-label">Om komponisten</div>
          <div class="d-note">${comp.note}</div>
          <div class="d-label">Musikalske kjennetegn</div>
          <ul class="char-list">${charItems}</ul>
          <div class="d-label">Lytt på YouTube</div>
          <div class="yt-links">${ytLinks}</div>
        </div>`;
    }
  }

  content.innerHTML = `
    <div class="era-header">
      <div class="years-badge" style="background:${era.badgeBg};color:${era.badgeText}">${era.years}</div>
      <h2>${era.label}</h2>
      <p class="summary">${era.summary}</p>
    </div>
    <div class="two-col">${infoCols}</div>
    <hr class="section-divider">
    <div class="section-label">Sentrale komponister — klikk for detaljer</div>
    <div class="composer-grid">${composerBtns}</div>
    ${detailHTML}
  `;
}

window.selectComposer = function(btn) {
  const name = eras[activeIdx].composers[parseInt(btn.dataset.idx)].name;
  activeComposer = activeComposer === name ? null : name;
  renderNav(); renderMain();
};

// ── QUIZ STATE ────────────────────────────────────────────────────
let qzEra = 'medieval';
let qzIdx = 0;
let qzScore = 0;
let qzOrder = [];
let qzAnswered = false;

function qzShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(eraId) {
  qzEra = eraId; qzIdx = 0; qzScore = 0; qzAnswered = false;
  qzOrder = qzShuffle([...Array(quizData[eraId].questions.length).keys()]);
  renderQuiz();
}

function renderQzPicker() {
  const row = document.getElementById('qz-era-row');
  if (!row) return;
  row.innerHTML = Object.entries(quizData).map(([id, d]) => {
    const act = id === qzEra ? ' active' : '';
    const sty = id === qzEra ? 'border-color:' + d.accent + ';color:' + d.accent : '';
    return '<button class="qz-era-btn' + act + '" style="' + sty + '" data-era="' + id + '">' + d.label + '</button>';
  }).join('');
  row.querySelectorAll('.qz-era-btn').forEach(btn => {
    btn.addEventListener('click', function() { startQuiz(this.dataset.era); });
  });
}

function renderQuiz() {
  renderQzPicker();
  const body = document.getElementById('qz-body');
  if (!body) return;
  const d = quizData[qzEra];
  const total = qzOrder.length;

  if (qzIdx >= total) {
    const pct = Math.round(qzScore / total * 100);
    const msg = pct === 100 ? 'Perfekt!' : pct >= 70 ? 'Bra jobba!' : 'Les litt mer og prøv igjen!';
    body.innerHTML = '<div class="qz-result"><div class="score" style="color:' + d.accent + '">' + qzScore + '/' + total + '</div><p>' + msg + ' Du fikk ' + pct + '% rett på ' + d.label + '.</p><button class="qz-restart" id="qz-restart-btn">Prøv igjen ↺</button></div>';
    document.getElementById('qz-restart-btn').addEventListener('click', function() { startQuiz(qzEra); });
    return;
  }

  const qi = qzOrder[qzIdx];
  const q = d.questions[qi];
  qzAnswered = false;

  // Shuffle the answer options while tracking which is correct
  const optIndices = qzShuffle([0, 1, 2, 3]);
  const shuffledOpts = optIndices.map(i => q.opts[i]);
  const correctShuffled = optIndices.indexOf(q.c);

  body.innerHTML =
    '<div class="qz-header"><h2>' + d.label + '</h2><p>Velg riktig svar</p></div>' +
    '<div class="qz-progress">Spørsmål ' + (qzIdx + 1) + ' av ' + total + ' &nbsp;·&nbsp; Poeng: ' + qzScore + '</div>' +
    '<div class="qz-card">' +
      '<div class="qz-q">' + q.q + '</div>' +
      '<div class="qz-opts" id="qz-opts">' +
        shuffledOpts.map((opt, i) => '<button class="qz-opt" data-i="' + i + '">' + opt + '</button>').join('') +
      '</div>' +
      '<div id="qz-fb"></div>' +
    '</div>';

  document.querySelectorAll('.qz-opt').forEach(btn => {
    btn.addEventListener('click', function() {
      if (qzAnswered) return;
      qzAnswered = true;
      const chosen = parseInt(this.dataset.i);
      document.querySelectorAll('.qz-opt').forEach(b => b.classList.add('disabled'));
      this.classList.add(chosen === correctShuffled ? 'correct' : 'wrong');
      if (chosen !== correctShuffled) document.querySelector('.qz-opt[data-i="' + correctShuffled + '"]').classList.add('reveal');
      if (chosen === correctShuffled) qzScore++;
      const fb = document.getElementById('qz-fb');
      fb.className = 'qz-explain ' + (chosen === correctShuffled ? 'correct' : 'wrong');
      const nextLabel = qzIdx + 1 < total ? 'Neste spørsmål →' : 'Se resultatet →';
      fb.innerHTML = (chosen === correctShuffled ? '✓ Riktig! ' : '✗ Feil. ') + q.e + '<br><button class="qz-next" id="qz-next-btn">' + nextLabel + '</button>';
      document.getElementById('qz-next-btn').addEventListener('click', function() { qzIdx++; renderQuiz(); });
    });
  });
}

window.switchView = function(view) {
  const views = { tl: 'view-tl', qz: 'view-qz', bg: 'view-bg' };
  const tabs  = { tl: 'tab-tl',  qz: 'tab-qz',  bg: 'tab-bg'  };
  Object.keys(views).forEach(k => {
    const el = document.getElementById(views[k]);
    const tb = document.getElementById(tabs[k]);
    if (el) el.style.display = k === view ? '' : 'none';
    if (tb) tb.classList.toggle('active', k === view);
  });
  if (view === 'qz') { if (!qzOrder.length) startQuiz(qzEra); else renderQuiz(); }
  if (view === 'bg') renderBegreper();
};

window.toggleTheme = function() {
  const html = document.documentElement;
  const btn = document.getElementById('theme-toggle');
  if (html.classList.contains('light')) {
    html.classList.remove('light');
    btn.textContent = '☀ Lys modus';
    localStorage.setItem('theme', 'dark');
  } else {
    html.classList.add('light');
    btn.textContent = '☾ Mørk modus';
    localStorage.setItem('theme', 'light');
  }
};
// Restore saved theme
(function() {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.classList.add('light');
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = '☾ Mørk modus';
  }
})();

let bgCat = 'Alle';
let openTerm = null;
const bgCats = ['Alle', 'Former', 'Begreper'];

function renderBegreper() {
  const c = document.getElementById('bg-content');
  if (!c) return;
  const filtered = bgCat === 'Alle' ? begreper : begreper.filter(b => b.cat === bgCat);
  const catBtns = bgCats.map(cat => {
    const act = cat === bgCat ? ' active" style="border-color:#c8a96a;color:#c8a96a' : '';
    return '<button class="bg-cat-btn' + act + '" data-cat="' + cat + '">' + cat + '</button>';
  }).join('');
  const cards = filtered.map(b => {
    const isOpen = b.term === openTerm ? ' open' : '';
    return '<div class="bg-card' + isOpen + '" data-term="' + b.term + '">' +
      '<div class="bg-cat">' + b.cat + '</div>' +
      '<div class="bg-term">' + b.term + '</div>' +
      '<div class="bg-short">' + b.short + '</div>' +
      '<div class="bg-long">' + b.long + '<div class="bg-ex">' + b.ex + '</div></div>' +
    '</div>';
  }).join('');
  c.innerHTML =
    '<div style="margin-bottom:1rem"><div class="years-badge" style="background:rgba(200,169,106,0.12);color:#c8a96a">Musikalske former og begreper</div>' +
    '<h2 style="font-family:Playfair Display,serif;font-size:2rem;font-weight:700;margin-top:8px;margin-bottom:6px">Begrepsordbok</h2>' +
    '<p style="font-size:14px;color:var(--muted);font-weight:300;margin-bottom:1.5rem">Klikk på et begrep for full forklaring og eksempel.</p></div>' +
    '<div class="bg-cats">' + catBtns + '</div>' +
    '<div class="bg-grid">' + cards + '</div>';
  c.querySelectorAll('.bg-cat-btn').forEach(btn => {
    btn.addEventListener('click', function() { bgCat = this.dataset.cat; openTerm = null; renderBegreper(); });
  });
  c.querySelectorAll('.bg-card').forEach(card => {
    card.addEventListener('click', function() {
      const term = this.dataset.term;
      openTerm = openTerm === term ? null : term;
      renderBegreper();
    });
  });
}
